# sketch.igal-web.com — Sketch Together WebSocket relay (co-tenant on shared EC2)
# Routing strictly by server_name — NEVER default_server (protects co-tenants).
# certbot --nginx adds the 443 block + HTTP->HTTPS redirect to this file.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name sketch.igal-web.com;

    location / {
        proxy_pass http://127.0.0.1:8098;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Idle websockets stay open; the extension pings every 20s
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
